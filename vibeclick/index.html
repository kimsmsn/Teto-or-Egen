<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>테토력 테스트</title>

<link href="https://cdn.jsdelivr.net/gh/naen-nae/fonts@purge-cache-for-subsets/build/css/Pretendard.css" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Pretendard', sans-serif;
  background: #fff;
}

/* 시작 화면 */
.start-screen {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.image-box {
  position: relative;
  width: 90%;
  max-width: 430px;
}

.image-box img {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 20px;
}

.overlay-text {
  position: absolute;
  top: -20%;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  width: 80%;
}

.start-btn {
  position: absolute;
  bottom: -80px;
  left: 50%;
  transform: translateX(-50%);
  width: 85%;
  padding: 16px;
  border-radius: 12px;
  border: none;
  background: #000;
  color: #fff;
  font-size: 1.1rem;
}

/* 문제 화면 */
#questionScreen {
  display: none;
  min-height: 100vh;
  flex-direction: column;
}

.question-wrapper {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 20px;
}

#progressText {
  text-align: center;
  margin-bottom: 10px;
  font-weight: bold;
}

.question-text {
  font-size: 1.5rem;
  text-align: center;
  margin-bottom: 40px;
}

.options {
  margin-top: auto;
}

.options button {
  width: 100%;
  padding: 16px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: 1px solid #000;
  background: #fff;
}

/* 결과 */
.result-card {
  max-width: 520px;
  margin: auto;
  padding: 30px;
  text-align: center;
}

.result-card img {
  width: 80%;
  margin-top: 10px;
}

/* 버튼 */
.result-card button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: #000;
  color: #fff;
}
</style>
</head>

<body>

<!-- 시작 -->
<div id="startScreen" class="start-screen">
  <div class="image-box">
    <img src="너 테토냐 에겐이냐.jpg">
    <div class="overlay-text">
      <h1>💪테토력 테스트💪</h1>
    </div>
    <button id="startBtn" class="start-btn">시작하기</button>
  </div>
</div>

<!-- 문제 -->
<div id="questionScreen">
  <div class="question-wrapper">
    <div id="progressText"></div>
    <div class="question-text" id="questionText"></div>
    <div class="options">
      <button id="optionA"></button>
      <button id="optionB"></button>
    </div>
  </div>
</div>

<!-- 결과 -->
<div id="resultScreen" style="display:none;">
  <div class="result-card">
    <h2 id="resultTitle"></h2>
    <img id="resultImg">
    <p id="resultDesc"></p>
    <ul id="resultFeatures"></ul>
    <p id="resultLine"></p>

    <button id="retryBtn">다시하기</button>
    <button id="shareBtn">공유하기</button>
  </div>
</div>

<script>
const questions=[
  {q:"단톡에서 갑자기 조용해졌다", a:"내가 드립 던져서 살림", b:"그냥 상황 지켜봄"},
  {q:"친구가 이상한 행동함", a:"같이 함", b:"속으로만 '왜저래…'"},
  {q:"카톡 답장 스타일", a:"드립 섞어서 보냄", b:"최대한 무난하게 보냄"},
  {q:"낯선 사람 많은 자리", a:"그냥 떠듦", b:"조용히 있음"},
  {q:"생각나는 말 있음", a:"필터 없이 말함", b:"한 번 더 고민함"},
  {q:"친구들이랑 있을 때", a:"내가 분위기 주도", b:"따라가는 편"},
  {q:"갑자기 춤추자는 상황", a:"바로 참여", b:"절대 안함"},
  {q:"실수했을 때", a:"그냥 웃고 넘김", b:"집 가서 계속 생각함"},
  {q:"친구들이 보는 너", a:"웃긴 애", b:"착한 애"},
  {q:"너의 본모습", a:"나 좀 이상함 인정", b:"나 그냥 평범함"}
];

const results=[
  {title:"🔥 핵테토", desc:"너는 그냥 인간이 아니라 콘텐츠다.", features:["분위기 장악","드립 중독","제어불가"], line:"👉 웃김", img:"핵테토.jpg"},
  {title:"⚡ 은근테토", desc:"조용하다가 터짐", features:["타이밍 미침","한방 있음"], line:"👉 폭탄", img:"은근테토.jpg"},
  {title:"🎭 상황형", desc:"상황 따라 변함", features:["적응력 좋음"], line:"👉 중간", img:"중간.jpg"},
  {title:"🧊 숨은 에겐", desc:"속은 소심", features:["생각 많음"], line:"👉 내향", img:"약간에겐.jpg"},
  {title:"🥺 에겐형", desc:"순한 인간", features:["거절 못함"], line:"👉 착함", img:"에겐.jpg"},
  {title:"🫠 핵에겐", desc:"보호 필요", features:["의존형"], line:"👉 보호", img:"핵에겐.jpg"}
];

let currentQuestion=0;
let score=0;

function showQuestion(){
  document.getElementById('progressText').innerText=(currentQuestion+1)+"/"+questions.length;
  document.getElementById('questionText').innerText=questions[currentQuestion].q;
  optionA.innerText=questions[currentQuestion].a;
  optionB.innerText=questions[currentQuestion].b;
}

function showResult(){
  let res;
  if(score>=8) res=results[0];
  else if(score>=6) res=results[1];
  else if(score>=4) res=results[2];
  else if(score==3) res=results[3];
  else if(score==2) res=results[4];
  else res=results[5];

  resultTitle.innerText=res.title;
  resultImg.src=res.img;
  resultDesc.innerText=res.desc;

  let ul=document.getElementById('resultFeatures');
  ul.innerHTML='';
  res.features.forEach(f=>{
    let li=document.createElement('li');
    li.innerText=f;
    ul.appendChild(li);
  });

  resultLine.innerText=res.line;

  document.getElementById('questionScreen').style.display='none';
  document.getElementById('resultScreen').style.display='block';
}

startBtn.onclick=()=>{
  document.getElementById('startScreen').style.display='none';
  document.getElementById('questionScreen').style.display='flex';
  showQuestion();
}

optionA.onclick=()=>{ score++; currentQuestion++; currentQuestion<questions.length?showQuestion():showResult(); }
optionB.onclick=()=>{ currentQuestion++; currentQuestion<questions.length?showQuestion():showResult(); }

retryBtn.onclick=()=>{
  currentQuestion=0;
  score=0;
  document.getElementById('resultScreen').style.display='none';
  document.getElementById('startScreen').style.display='flex';
}

/* 🔥 공유 기능 */
shareBtn.onclick=()=>{
  navigator.clipboard.writeText(location.href);
  alert('링크 복사 완료!');
}
</script>

</body>
</html>
